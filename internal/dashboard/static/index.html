<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reverse Proxy Dashboard</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fb;
        --panel: #ffffff;
        --panel-soft: #eef2f7;
        --text: #172033;
        --muted: #667085;
        --line: #d8dee8;
        --accent: #0f766e;
        --accent-strong: #115e59;
        --danger: #b42318;
        --ok: #15803d;
        --warn: #b45309;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font: 14px/1.5 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      header {
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        max-width: 1280px;
        margin: 0 auto;
        padding: 14px 20px;
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .brand strong {
        font-size: 17px;
      }

      .brand span,
      .muted {
        color: var(--muted);
      }

      main {
        max-width: 1280px;
        margin: 0 auto;
        padding: 20px;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        gap: 16px;
      }

      section,
      aside,
      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
      }

      h1,
      h2,
      h3 {
        margin: 0;
        letter-spacing: 0;
      }

      h1 {
        font-size: 18px;
      }

      h2 {
        font-size: 15px;
      }

      h3 {
        font-size: 13px;
      }

      .actions {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }

      button {
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        color: var(--text);
        min-height: 34px;
        padding: 7px 11px;
        font: inherit;
        cursor: pointer;
      }

      button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #ffffff;
      }

      button:hover {
        border-color: var(--accent);
      }

      button.primary:hover {
        background: var(--accent-strong);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      textarea {
        display: block;
        width: 100%;
        min-height: 560px;
        resize: vertical;
        border: 0;
        border-radius: 0 0 8px 8px;
        padding: 16px;
        color: #111827;
        background: #fbfcfe;
        font: 13px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
        outline: none;
      }

      textarea:focus {
        box-shadow: inset 0 0 0 2px rgba(15, 118, 110, 0.22);
      }

      .stack {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .content {
        padding: 14px 16px;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .stat {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
        background: var(--panel-soft);
      }

      .stat span {
        display: block;
        color: var(--muted);
        font-size: 12px;
      }

      .stat strong {
        display: block;
        margin-top: 2px;
        font-size: 20px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 9px 0;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      th {
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      code {
        border-radius: 4px;
        background: var(--panel-soft);
        padding: 2px 5px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
        font-size: 12px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 22px;
        border-radius: 999px;
        padding: 2px 8px;
        background: var(--panel-soft);
        color: var(--muted);
        font-size: 12px;
      }

      .pill.ok {
        color: var(--ok);
      }

      .pill.warn {
        color: var(--warn);
      }

      .message {
        min-height: 22px;
        color: var(--muted);
      }

      .message.error {
        color: var(--danger);
      }

      .message.ok {
        color: var(--ok);
      }

      .empty {
        color: var(--muted);
        padding: 10px 0;
      }

      @media (max-width: 920px) {
        .grid {
          grid-template-columns: 1fr;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        textarea {
          min-height: 420px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="topbar">
        <div class="brand">
          <strong>Reverse Proxy Dashboard</strong>
          <span>Cluster-wide proxy config</span>
        </div>
        <div class="actions">
          <button id="refreshButton" type="button">Refresh</button>
          <button id="saveButton" class="primary" type="button">Save Config</button>
        </div>
      </div>
    </header>

    <main>
      <div class="grid">
        <section>
          <div class="panel-head">
            <div>
              <h1>Proxy Config</h1>
              <div id="appliedAt" class="muted">Not loaded</div>
            </div>
            <div id="message" class="message"></div>
          </div>
          <textarea id="configEditor" spellcheck="false" aria-label="Proxy config JSON"></textarea>
        </section>

        <aside class="stack">
          <div class="panel">
            <div class="panel-head">
              <h2>Runtime</h2>
              <span id="runtimeState" class="pill">Loading</span>
            </div>
            <div class="content">
              <div class="stats">
                <div class="stat">
                  <span>Routes</span>
                  <strong id="routeCount">0</strong>
                </div>
                <div class="stat">
                  <span>Pools</span>
                  <strong id="poolCount">0</strong>
                </div>
                <div class="stat">
                  <span>Targets</span>
                  <strong id="targetCount">0</strong>
                </div>
                <div class="stat">
                  <span>Healthy</span>
                  <strong id="healthyCount">0</strong>
                </div>
              </div>
            </div>
          </div>

          <div class="panel">
            <div class="panel-head">
              <h2>Routes</h2>
            </div>
            <div class="content">
              <div id="routesTable"></div>
            </div>
          </div>

          <div class="panel">
            <div class="panel-head">
              <h2>Upstream Pools</h2>
            </div>
            <div class="content">
              <div id="poolsTable"></div>
            </div>
          </div>
        </aside>
      </div>
    </main>

    <script>
      const editor = document.getElementById("configEditor");
      const message = document.getElementById("message");
      const appliedAt = document.getElementById("appliedAt");
      const refreshButton = document.getElementById("refreshButton");
      const saveButton = document.getElementById("saveButton");

      const emptyConfig = {
        routes: [],
        upstream_pools: {}
      };

      function setMessage(text, kind = "") {
        message.textContent = text;
        message.className = `message ${kind}`.trim();
      }

      function setBusy(busy) {
        refreshButton.disabled = busy;
        saveButton.disabled = busy;
      }

      function formatDate(value) {
        if (!value) return "Not applied yet";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return `Applied ${date.toLocaleString()}`;
      }

      async function requestJSON(path, options = {}) {
        const response = await fetch(path, {
          headers: { "Content-Type": "application/json" },
          ...options
        });
        if (!response.ok) {
          let detail = `${response.status} ${response.statusText}`;
          try {
            const body = await response.json();
            detail = body.message || body.code || detail;
            if (Array.isArray(body.errors) && body.errors.length > 0) {
              detail += ": " + body.errors.map((item) => `${item.field} ${item.message}`).join("; ");
            }
          } catch (_) {
          }
          throw new Error(detail);
        }
        if (response.status === 204) return null;
        return response.json();
      }

      function normalizeConfig(view) {
        return {
          routes: Array.isArray(view.routes) ? view.routes : [],
          upstream_pools: view.upstream_pools && typeof view.upstream_pools === "object" ? view.upstream_pools : {}
        };
      }

      async function loadConfig() {
        setBusy(true);
        setMessage("Loading...");
        try {
          const view = await requestJSON("/api/config");
          const cfg = normalizeConfig(view || emptyConfig);
          editor.value = JSON.stringify(cfg, null, 2);
          appliedAt.textContent = formatDate(view && view.applied_at);
          renderConfigSummary(cfg);
          await loadRuntime();
          setMessage("Loaded", "ok");
        } catch (error) {
          editor.value = editor.value || JSON.stringify(emptyConfig, null, 2);
          renderConfigSummary(emptyConfig);
          setMessage(error.message, "error");
        } finally {
          setBusy(false);
        }
      }

      async function saveConfig() {
        let cfg;
        try {
          cfg = JSON.parse(editor.value);
        } catch (error) {
          setMessage(`Invalid JSON: ${error.message}`, "error");
          return;
        }
        setBusy(true);
        setMessage("Saving...");
        try {
          const view = await requestJSON("/api/config", {
            method: "PUT",
            body: JSON.stringify(cfg)
          });
          const saved = normalizeConfig(view || cfg);
          editor.value = JSON.stringify(saved, null, 2);
          appliedAt.textContent = formatDate(view && view.applied_at);
          renderConfigSummary(saved);
          await loadRuntime();
          setMessage("Saved", "ok");
        } catch (error) {
          setMessage(error.message, "error");
        } finally {
          setBusy(false);
        }
      }

      async function loadRuntime() {
        try {
          const runtime = await requestJSON("/api/runtime");
          renderRuntime(runtime || {});
        } catch (_) {
          document.getElementById("runtimeState").textContent = "Unavailable";
          document.getElementById("runtimeState").className = "pill warn";
        }
      }

      function renderRuntime(runtime) {
        const routes = Array.isArray(runtime.routes) ? runtime.routes : [];
        const pools = Array.isArray(runtime.upstreams) ? runtime.upstreams : [];
        const targetCount = pools.reduce((sum, pool) => sum + ((pool.targets || []).length), 0);
        const healthyCount = pools.reduce((sum, pool) => {
          return sum + (pool.targets || []).filter((target) => target.healthy).length;
        }, 0);

        document.getElementById("runtimeState").textContent = "Ready";
        document.getElementById("runtimeState").className = "pill ok";
        document.getElementById("routeCount").textContent = String(routes.length);
        document.getElementById("poolCount").textContent = String(pools.length);
        document.getElementById("targetCount").textContent = String(targetCount);
        document.getElementById("healthyCount").textContent = String(healthyCount);
      }

      function renderConfigSummary(cfg) {
        const routes = Array.isArray(cfg.routes) ? cfg.routes : [];
        const pools = cfg.upstream_pools && typeof cfg.upstream_pools === "object" ? cfg.upstream_pools : {};
        renderRoutes(routes);
        renderPools(pools);
      }

      function renderRoutes(routes) {
        const host = document.getElementById("routesTable");
        if (routes.length === 0) {
          host.innerHTML = '<div class="empty">No routes</div>';
          return;
        }
        host.innerHTML = `
          <table>
            <thead><tr><th>ID</th><th>Hosts</th><th>Pool</th></tr></thead>
            <tbody>
              ${routes.map((route) => `
                <tr>
                  <td><code>${escapeHTML(route.id || "")}</code></td>
                  <td>${escapeHTML(((route.match && route.match.hosts) || []).join(", "))}</td>
                  <td><code>${escapeHTML(route.upstream_pool || "")}</code></td>
                </tr>
              `).join("")}
            </tbody>
          </table>`;
      }

      function renderPools(pools) {
        const host = document.getElementById("poolsTable");
        const rows = Object.entries(pools);
        if (rows.length === 0) {
          host.innerHTML = '<div class="empty">No pools</div>';
          return;
        }
        host.innerHTML = `
          <table>
            <thead><tr><th>ID</th><th>Targets</th></tr></thead>
            <tbody>
              ${rows.map(([id, pool]) => `
                <tr>
                  <td><code>${escapeHTML(id)}</code></td>
                  <td>${escapeHTML(((pool && pool.upstreams) || []).join(", "))}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>`;
      }

      function escapeHTML(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      refreshButton.addEventListener("click", loadConfig);
      saveButton.addEventListener("click", saveConfig);
      loadConfig();
    </script>
  </body>
</html>
