<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cluster Lifecycle</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #17202a;
      }

      body {
        margin: 0;
      }

      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
        margin-bottom: 24px;
      }

      h1 {
        font-size: 28px;
        line-height: 1.2;
        margin: 0 0 6px;
      }

      h2 {
        font-size: 18px;
        margin: 0 0 16px;
      }

      p {
        margin: 0;
        color: #5f6b7a;
      }

      a {
        color: #1f6feb;
        text-decoration: none;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .panel {
        background: #ffffff;
        border: 1px solid #d8dee8;
        border-radius: 8px;
        padding: 18px;
      }

      .status {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 16px;
      }

      .metric {
        background: #eef2f7;
        border-radius: 8px;
        padding: 12px;
        min-height: 72px;
      }

      .metric span {
        display: block;
        color: #667085;
        font-size: 12px;
      }

      .metric strong {
        display: block;
        margin-top: 6px;
        font-size: 15px;
        overflow-wrap: anywhere;
      }

      form {
        display: grid;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 13px;
        color: #445064;
      }

      input,
      textarea {
        min-height: 38px;
        border: 1px solid #c8d0dc;
        border-radius: 6px;
        padding: 8px 10px;
        font: inherit;
        background: #ffffff;
        color: #17202a;
      }

      textarea {
        min-height: 86px;
        resize: vertical;
      }

      button {
        min-height: 38px;
        border: 1px solid #1f6feb;
        border-radius: 6px;
        background: #1f6feb;
        color: #ffffff;
        padding: 8px 12px;
        font-weight: 600;
        cursor: pointer;
      }

      button.secondary {
        background: #ffffff;
        color: #1f6feb;
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      pre {
        margin: 0;
        overflow: auto;
        background: #111827;
        color: #e5e7eb;
        border-radius: 8px;
        padding: 14px;
        min-height: 112px;
      }

      .actions {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .message {
        margin-top: 14px;
        min-height: 22px;
        font-size: 14px;
      }

      .ok {
        color: #067647;
      }

      .error {
        color: #b42318;
      }

      @media (max-width: 820px) {
        header,
        .grid,
        .status {
          grid-template-columns: 1fr;
          display: grid;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Cluster Lifecycle</h1>
          <p>Bootstrap or join this node through the dashboard lifecycle API.</p>
        </div>
        <a href="/">Dashboard</a>
      </header>

      <section class="panel">
        <div class="actions">
          <button id="refresh" class="secondary" type="button">Refresh</button>
          <span id="status-message" class="message"></span>
        </div>
        <div class="status" aria-live="polite">
          <div class="metric"><span>State</span><strong id="state">-</strong></div>
          <div class="metric"><span>Node ID</span><strong id="node-id">-</strong></div>
          <div class="metric"><span>Raft Advertise</span><strong id="raft-advertise">-</strong></div>
          <div class="metric"><span>Data Dir</span><strong id="raft-data-dir">-</strong></div>
        </div>
        <pre id="status-json">{}</pre>
      </section>

      <section class="grid" style="margin-top: 16px">
        <div class="panel">
          <h2>Bootstrap Cluster</h2>
          <form id="bootstrap-form">
            <label>Node ID<input name="node_id" required placeholder="node-1" /></label>
            <label>Raft Bind Address<input name="raft_bind_addr" placeholder="0.0.0.0:7001" /></label>
            <label>Raft Advertise Address<input name="raft_advertise_addr" required placeholder="10.0.0.11:7001" /></label>
            <label>VIP Interface<input name="vip_interface" placeholder="eth0" /></label>
            <label>VIP Address<input name="vip_address" placeholder="10.0.0.100/24" /></label>
            <label>GARP Count<input name="garp_count" type="number" min="0" placeholder="3" /></label>
            <label>GARP Interval<input name="garp_interval" placeholder="100ms" /></label>
            <label>Acquire Delay<input name="acquire_delay" placeholder="300ms" /></label>
            <label><input name="release_on_shutdown" type="checkbox" /> Release VIP on shutdown</label>
            <label>Heartbeat Timeout<input name="heartbeat_timeout" placeholder="3s" /></label>
            <label>Election Timeout<input name="election_timeout" placeholder="5s" /></label>
            <label>Leader Lease Timeout<input name="leader_lease_timeout" placeholder="2s" /></label>
            <label>Commit Timeout<input name="commit_timeout" placeholder="250ms" /></label>
            <button type="submit">Bootstrap</button>
            <div id="bootstrap-message" class="message"></div>
          </form>
        </div>

        <div class="panel">
          <h2>Join Cluster</h2>
          <form id="join-form">
            <label>Node ID<input name="node_id" required placeholder="node-2" /></label>
            <label>Raft Bind Address<input name="raft_bind_addr" placeholder="0.0.0.0:7002" /></label>
            <label>Raft Advertise Address<input name="raft_advertise_addr" required placeholder="10.0.0.12:7002" /></label>
            <label>VIP Interface<input name="vip_interface" placeholder="eth0" /></label>
            <label>Peer Dashboard URLs<textarea name="peers" required placeholder="http://10.0.0.11:9090"></textarea></label>
            <button type="submit">Join</button>
            <div id="join-message" class="message"></div>
          </form>
        </div>
      </section>
    </main>

    <script>
      const byId = (id) => document.getElementById(id);

      async function request(path, options = {}) {
        const response = await fetch(path, options);
        if (response.ok) return response.status === 204 ? null : response.json();
        const body = await response.json().catch(() => ({ message: response.statusText }));
        throw new Error(body.message || `${response.status} ${response.statusText}`);
      }

      async function refreshStatus() {
        setMessage("status-message", "Loading...", "");
        try {
          const status = await request("/api/node/cluster-status");
          renderStatus(status);
          setMessage("status-message", "Current", "ok");
        } catch (error) {
          setMessage("status-message", error.message, "error");
        }
      }

      function renderStatus(status) {
        byId("state").textContent = status.state || "-";
        byId("node-id").textContent = status.node_id || "-";
        byId("raft-advertise").textContent = status.raft_advertise_addr || "-";
        byId("raft-data-dir").textContent = status.raft_data_dir || "-";
        byId("status-json").textContent = JSON.stringify(status, null, 2);
      }

      function setMessage(id, message, kind) {
        const node = byId(id);
        node.textContent = message;
        node.className = `message ${kind || ""}`;
      }

      function readForm(form) {
        return Object.fromEntries(new FormData(form).entries());
      }

      function bootstrapRequest(form) {
        const data = readForm(form);
        const request = lifecycleBaseRequest(data);
        const vip = vipRequest(data);
        if (vip) request.vip = vip;
        const timing = raftTimingRequest(data);
        if (timing) request.raft_timing = timing;
        return request;
      }

      function joinRequest(form) {
        const data = readForm(form);
        return {
          ...lifecycleBaseRequest(data),
          peers: data.peers
            .split(/\s+/)
            .map((peer) => peer.trim())
            .filter(Boolean),
        };
      }

      function lifecycleBaseRequest(data) {
        const request = {
          node_id: data.node_id,
          raft_advertise_addr: data.raft_advertise_addr,
        };
        if (data.raft_bind_addr) request.raft_bind_addr = data.raft_bind_addr;
        if (data.vip_interface) request.vip_interface = data.vip_interface;
        return request;
      }

      function vipRequest(data) {
        if (!data.vip_address) return null;
        const vip = { address: data.vip_address };
        const garpCount = Number.parseInt(data.garp_count || "0", 10);
        if (garpCount > 0) vip.garp_count = garpCount;
        if (data.garp_interval) vip.garp_interval = data.garp_interval;
        if (data.acquire_delay) vip.acquire_delay = data.acquire_delay;
        if (data.release_on_shutdown === "on") vip.release_on_shutdown = true;
        return vip;
      }

      function raftTimingRequest(data) {
        const timing = {};
        if (data.heartbeat_timeout) timing.heartbeat_timeout = data.heartbeat_timeout;
        if (data.election_timeout) timing.election_timeout = data.election_timeout;
        if (data.leader_lease_timeout) timing.leader_lease_timeout = data.leader_lease_timeout;
        if (data.commit_timeout) timing.commit_timeout = data.commit_timeout;
        return Object.keys(timing).length ? timing : null;
      }

      async function submitJSON(form, path, body, messageId, success) {
        const button = form.querySelector("button[type=submit]");
        button.disabled = true;
        setMessage(messageId, "Submitting...", "");
        try {
          await request(path, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          setMessage(messageId, success, "ok");
          await refreshStatus();
        } catch (error) {
          setMessage(messageId, error.message, "error");
        } finally {
          button.disabled = false;
        }
      }

      byId("refresh").addEventListener("click", refreshStatus);
      byId("bootstrap-form").addEventListener("submit", (event) => {
        event.preventDefault();
        submitJSON(event.currentTarget, "/api/cluster/bootstrap", bootstrapRequest(event.currentTarget), "bootstrap-message", "Bootstrapped");
      });
      byId("join-form").addEventListener("submit", (event) => {
        event.preventDefault();
        submitJSON(event.currentTarget, "/api/node/join-cluster", joinRequest(event.currentTarget), "join-message", "Joined");
      });

      refreshStatus();
    </script>
  </body>
</html>
