<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="240" viewBox="0 0 1120 240" role="img" aria-labelledby="title desc">
  <title id="title">Week 03 reverse proxy request flow</title>
  <desc id="desc">Client request flows through proxy handler, route resolve, backend pool, selected backend, reverse proxy, and backend server.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1120" height="240" fill="#ffffff"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="560" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">Reverse Proxy Request Flow</text>
    <g filter="url(#shadow)">
      <rect x="32" y="84" width="140" height="72" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
      <rect x="202" y="84" width="140" height="72" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
      <rect x="372" y="84" width="140" height="72" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
      <rect x="542" y="84" width="140" height="72" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
      <rect x="712" y="84" width="140" height="72" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
      <rect x="882" y="84" width="140" height="72" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
    </g>
    <text x="102" y="113" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Client</text>
    <text x="102" y="136" text-anchor="middle" font-size="14" fill="#334155">HTTP Request</text>
    <text x="272" y="113" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Proxy Handler</text>
    <text x="272" y="136" text-anchor="middle" font-size="14" fill="#334155">Receive request</text>
    <text x="442" y="113" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Route Resolve</text>
    <text x="442" y="136" text-anchor="middle" font-size="14" fill="#334155">Match host/path</text>
    <text x="612" y="113" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Backend Pool</text>
    <text x="612" y="136" text-anchor="middle" font-size="14" fill="#334155">Candidate servers</text>
    <text x="782" y="113" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Selected Backend</text>
    <text x="782" y="136" text-anchor="middle" font-size="14" fill="#334155">Choose target</text>
    <text x="952" y="113" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">ReverseProxy</text>
    <text x="952" y="136" text-anchor="middle" font-size="14" fill="#334155">Forward request</text>
    <line x1="172" y1="120" x2="202" y2="120" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="342" y1="120" x2="372" y2="120" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="512" y1="120" x2="542" y2="120" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="682" y1="120" x2="712" y2="120" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="852" y1="120" x2="882" y2="120" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="452" y="184" width="236" height="34" rx="6" fill="#f9fafb" stroke="#d1d5db"/>
    <text x="570" y="206" text-anchor="middle" font-size="14" fill="#374151">Backend server returns response to client through the proxy path</text>
  </g>
</svg>
