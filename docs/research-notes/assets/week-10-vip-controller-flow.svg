<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="330" viewBox="0 0 1120 330" role="img" aria-labelledby="title desc">
  <title id="title">Week 10 VIP controller leader event flow</title>
  <desc id="desc">Leader events decide whether the VIP controller verifies leadership and adds VIP with GARP, or removes VIP when becoming follower.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1120" height="330" fill="#ffffff"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="560" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">VIP Controller Flow</text>

    <g filter="url(#shadow)">
      <rect x="60" y="118" width="150" height="74" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
      <rect x="280" y="56" width="160" height="74" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
      <rect x="506" y="56" width="160" height="74" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
      <rect x="732" y="56" width="160" height="74" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
      <rect x="280" y="214" width="160" height="74" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
      <rect x="506" y="214" width="160" height="74" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
    </g>

    <text x="135" y="148" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">LeaderCh</text>
    <text x="135" y="171" text-anchor="middle" font-size="14" fill="#334155">Raft event</text>

    <text x="360" y="86" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Leader true</text>
    <text x="360" y="109" text-anchor="middle" font-size="14" fill="#334155">acquire path</text>

    <text x="586" y="86" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">VerifyLeader</text>
    <text x="586" y="109" text-anchor="middle" font-size="14" fill="#334155">confirm state</text>

    <text x="812" y="86" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">VIP add + GARP</text>
    <text x="812" y="109" text-anchor="middle" font-size="14" fill="#334155">service entry</text>

    <text x="360" y="244" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Leader false</text>
    <text x="360" y="267" text-anchor="middle" font-size="14" fill="#334155">release path</text>

    <text x="586" y="244" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">VIP remove</text>
    <text x="586" y="267" text-anchor="middle" font-size="14" fill="#334155">follower state</text>

    <line x1="210" y1="140" x2="280" y2="102" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="440" y1="93" x2="506" y2="93" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="666" y1="93" x2="732" y2="93" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="210" y1="172" x2="280" y2="238" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="440" y1="251" x2="506" y2="251" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="696" y="214" width="300" height="74" rx="8" fill="#f9fafb" stroke="#d1d5db"/>
    <text x="846" y="240" text-anchor="middle" font-size="14" font-weight="700" fill="#374151">Required Linux capabilities</text>
    <text x="846" y="262" text-anchor="middle" font-size="14" fill="#374151">NET_ADMIN for VIP</text>
    <text x="846" y="280" text-anchor="middle" font-size="14" fill="#374151">NET_RAW for GARP</text>
  </g>
</svg>
