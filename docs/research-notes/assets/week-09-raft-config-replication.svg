<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="300" viewBox="0 0 1120 300" role="img" aria-labelledby="title desc">
  <title id="title">Week 09 Raft config replication flow</title>
  <desc id="desc">A configuration command is encoded, applied through the Raft log, handled by the FSM, stored as desired state, and projected into a runtime snapshot.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1120" height="300" fill="#ffffff"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="560" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">Raft Config Replication Flow</text>

    <g filter="url(#shadow)">
      <rect x="42" y="92" width="150" height="78" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
      <rect x="232" y="92" width="150" height="78" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
      <rect x="422" y="92" width="150" height="78" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
      <rect x="612" y="92" width="150" height="78" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
      <rect x="802" y="92" width="150" height="78" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
      <rect x="392" y="206" width="390" height="62" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
    </g>

    <text x="117" y="122" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Admin Write</text>
    <text x="117" y="146" text-anchor="middle" font-size="14" fill="#334155">route / pool</text>

    <text x="307" y="122" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Command</text>
    <text x="307" y="146" text-anchor="middle" font-size="14" fill="#334155">JSON encoded</text>

    <text x="497" y="122" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Raft Log</text>
    <text x="497" y="146" text-anchor="middle" font-size="14" fill="#334155">commit order</text>

    <text x="687" y="122" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">FSM Apply</text>
    <text x="687" y="146" text-anchor="middle" font-size="14" fill="#334155">validate state</text>

    <text x="877" y="122" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Desired State</text>
    <text x="877" y="146" text-anchor="middle" font-size="14" fill="#334155">namespaces</text>

    <text x="587" y="230" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Projection builds route table</text>
    <text x="587" y="252" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">and upstream registry for runtime snapshot</text>

    <line x1="192" y1="131" x2="232" y2="131" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="382" y1="131" x2="422" y2="131" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="572" y1="131" x2="612" y2="131" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="762" y1="131" x2="802" y2="131" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
    <path d="M 877 170 L 877 192 L 587 192 L 587 206" fill="none" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="58" y="50" width="276" height="38" rx="6" fill="#f9fafb" stroke="#d1d5db"/>
    <text x="196" y="65" text-anchor="middle" font-size="12" fill="#374151">runtime-only health state</text>
    <text x="196" y="80" text-anchor="middle" font-size="12" fill="#374151">is not stored in Raft</text>
  </g>
</svg>
