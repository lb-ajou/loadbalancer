<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="340" viewBox="0 0 1120 340" role="img" aria-labelledby="title desc">
  <title id="title">Week 14 cluster lifecycle state flow</title>
  <desc id="desc">A clean node starts unconfigured, then can bootstrap or join a cluster. A node with existing Raft state restores clustered state on restart.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1120" height="340" fill="#ffffff"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="560" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">Cluster Lifecycle Flow</text>

    <g filter="url(#shadow)">
      <rect x="62" y="126" width="160" height="78" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
      <rect x="318" y="66" width="174" height="78" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
      <rect x="318" y="214" width="174" height="78" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
      <rect x="600" y="126" width="172" height="78" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
      <rect x="866" y="126" width="172" height="78" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    </g>

    <text x="142" y="156" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Clean Node</text>
    <text x="142" y="180" text-anchor="middle" font-size="14" fill="#334155">unconfigured</text>

    <text x="405" y="96" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Bootstrap API</text>
    <text x="405" y="120" text-anchor="middle" font-size="14" fill="#334155">create cluster</text>

    <text x="405" y="244" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Join API</text>
    <text x="405" y="268" text-anchor="middle" font-size="14" fill="#334155">join existing cluster</text>

    <text x="686" y="156" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Clustered Node</text>
    <text x="686" y="180" text-anchor="middle" font-size="14" fill="#334155">Raft running</text>

    <text x="952" y="156" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Existing State</text>
    <text x="952" y="180" text-anchor="middle" font-size="14" fill="#334155">restore on restart</text>

    <line x1="222" y1="150" x2="318" y2="112" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="222" y1="180" x2="318" y2="238" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="492" y1="105" x2="600" y2="146" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="492" y1="253" x2="600" y2="184" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="866" y1="165" x2="772" y2="165" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="118" y="22" width="312" height="28" rx="6" fill="#f9fafb" stroke="#d1d5db"/>
    <text x="274" y="41" text-anchor="middle" font-size="13" fill="#374151">GET /api/node/cluster-status decides allowed actions</text>

    <rect x="222" y="304" width="674" height="28" rx="6" fill="#f9fafb" stroke="#d1d5db"/>
    <text x="559" y="323" text-anchor="middle" font-size="13" fill="#374151">Dashboard and CLI call the same lifecycle APIs. Local config files are not edited for bootstrap or join.</text>
  </g>
</svg>
