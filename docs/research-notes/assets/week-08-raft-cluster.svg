<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="360" viewBox="0 0 1120 360" role="img" aria-labelledby="title desc">
  <title id="title">Week 08 Raft cluster concept</title>
  <desc id="desc">Admin write goes to the Raft leader, is replicated to follower nodes, and each node builds its own runtime snapshot. VIP ownership follows the leader.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1120" height="360" fill="#ffffff"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="560" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">Raft Cluster Control Plane Concept</text>

    <g filter="url(#shadow)">
      <rect x="60" y="84" width="150" height="76" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
      <rect x="286" y="76" width="196" height="92" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
      <rect x="612" y="60" width="192" height="82" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
      <rect x="612" y="176" width="192" height="82" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
      <rect x="842" y="60" width="192" height="82" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
      <rect x="842" y="176" width="192" height="82" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
      <rect x="286" y="238" width="196" height="64" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    </g>

    <text x="135" y="114" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Admin API</text>
    <text x="135" y="138" text-anchor="middle" font-size="14" fill="#334155">config write</text>

    <text x="384" y="106" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Raft Leader</text>
    <text x="384" y="130" text-anchor="middle" font-size="14" fill="#334155">accepts writes</text>
    <text x="384" y="150" text-anchor="middle" font-size="14" fill="#334155">owns VIP</text>

    <text x="708" y="94" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Follower Node</text>
    <text x="708" y="119" text-anchor="middle" font-size="14" fill="#334155">replicated log</text>

    <text x="708" y="210" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Follower Node</text>
    <text x="708" y="235" text-anchor="middle" font-size="14" fill="#334155">replicated log</text>

    <text x="938" y="94" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Runtime Snapshot</text>
    <text x="938" y="119" text-anchor="middle" font-size="14" fill="#334155">local data plane</text>

    <text x="938" y="210" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Runtime Snapshot</text>
    <text x="938" y="235" text-anchor="middle" font-size="14" fill="#334155">local data plane</text>

    <text x="384" y="264" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Runtime Snapshot</text>
    <text x="384" y="286" text-anchor="middle" font-size="14" fill="#334155">leader local data plane</text>

    <line x1="210" y1="122" x2="286" y2="122" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="482" y1="102" x2="612" y2="102" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="482" y1="138" x2="612" y2="214" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="804" y1="101" x2="842" y2="101" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="804" y1="217" x2="842" y2="217" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="384" y1="168" x2="384" y2="238" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="62" y="304" width="972" height="34" rx="6" fill="#f9fafb" stroke="#d1d5db"/>
    <text x="548" y="326" text-anchor="middle" font-size="14" fill="#374151">Raft replicates desired config. Health state, active connections, and proxy cache remain local runtime state.</text>
  </g>
</svg>
