<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="300" viewBox="0 0 1220 300" role="img" aria-labelledby="title desc">
  <title id="title">Week 16 container image workflow</title>
  <desc id="desc">GitHub Actions resolves a dashboard release, embeds the static asset, runs tests, builds multi-architecture images, publishes them to GHCR, and documents the final report.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1220" height="300" fill="#ffffff"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="610" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">Container Image Build and Release Workflow</text>

    <g filter="url(#shadow)">
      <rect x="40" y="102" width="158" height="76" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
      <rect x="238" y="102" width="158" height="76" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
      <rect x="436" y="102" width="158" height="76" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
      <rect x="634" y="102" width="158" height="76" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
      <rect x="832" y="102" width="158" height="76" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
      <rect x="1030" y="102" width="158" height="76" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
    </g>

    <text x="119" y="132" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Trigger</text>
    <text x="119" y="154" text-anchor="middle" font-size="13" fill="#334155">main push / manual</text>

    <text x="317" y="132" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Resolve Dashboard</text>
    <text x="317" y="154" text-anchor="middle" font-size="13" fill="#334155">release tag</text>

    <text x="515" y="132" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Embed Asset</text>
    <text x="515" y="154" text-anchor="middle" font-size="13" fill="#334155">index.html</text>

    <text x="713" y="132" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Go Test</text>
    <text x="713" y="154" text-anchor="middle" font-size="13" fill="#334155">go test ./...</text>

    <text x="911" y="132" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Buildx Build</text>
    <text x="911" y="154" text-anchor="middle" font-size="13" fill="#334155">amd64 / arm64</text>

    <text x="1109" y="132" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">GHCR Publish</text>
    <text x="1109" y="154" text-anchor="middle" font-size="13" fill="#334155">sha tag / latest</text>
    <line x1="198" y1="140" x2="238" y2="140" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="396" y1="140" x2="436" y2="140" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="594" y1="140" x2="634" y2="140" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="792" y1="140" x2="832" y2="140" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="990" y1="140" x2="1030" y2="140" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="104" y="224" width="1012" height="34" rx="6" fill="#f9fafb" stroke="#d1d5db"/>
    <text x="610" y="246" text-anchor="middle" font-size="13" fill="#374151">The workflow keeps frontend release consumption, backend tests, multi-platform image build, and GHCR publishing in one automated path.</text>
  </g>
</svg>
